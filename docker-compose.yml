# =============================================================================
# digital-finance-mobile 独立部署文件
# 镜像来源: SWR (华为云容器镜像服务)
# 依赖: go-backend + ai-service 已就绪 (通过 external network 通信)
# =============================================================================
version: "3.8"

services:
  mobile:
    image: swr.ap-southeast-3.myhuaweicloud.com/digital-finance-commercial/mobile:${TAG:-latest}
    container_name: df-mobile
    restart: unless-stopped
    ports:
      - "${MOBILE_PORT:-16020}:16020"
    environment:
      NODE_ENV: production
      PORT: "16020"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://go-backend:16080}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - df-network

networks:
  df-network:
    name: digital-finance-network
    external: true